# monitoring/grafana/provisioning/datasources/datasources.yml
# Grafana Datasource Configuration
# ============================================================================

apiVersion: 1

datasources:
  # --------------------------------------------------------------------------
  # Prometheus Datasource
  # --------------------------------------------------------------------------
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false
    jsonData:
      timeInterval: "15s"
      httpMethod: POST

  # --------------------------------------------------------------------------
  # PostgreSQL Datasource
  # --------------------------------------------------------------------------
  - name: PostgreSQL
    type: postgres
    url: postgres:5432
    database: youtube_automation
    user: youtube_user
    secureJsonData:
      password: ${DB_PASSWORD}
    jsonData:
      sslmode: disable
      maxOpenConns: 5
      maxIdleConns: 2
      connMaxLifetime: 14400
    editable: false

  # --------------------------------------------------------------------------
  # Redis Datasource
  # --------------------------------------------------------------------------
  - name: Redis
    type: redis-datasource
    url: redis://redis:6379
    isDefault: false
    editable: false
